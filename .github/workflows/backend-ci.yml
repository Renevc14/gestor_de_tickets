name: Backend CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15.5
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: ticketflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/ticketflow_test
      JWT_SECRET: ${{ secrets.JWT_SECRET_TEST || 'ci-test-secret-at-least-32-characters-long!' }}
      NODE_ENV: test
      FRONTEND_URL: http://localhost:3000

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Ejecutar migraciones Prisma
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Poblar datos de seed
        working-directory: backend
        run: node prisma/seed.js

      - name: Ejecutar tests con cobertura
        working-directory: backend
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Subir reporte de cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7
