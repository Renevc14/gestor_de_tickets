[build]
builder = "NIXPACKS"
buildCommand = "npm install --prefix backend && cd backend && npx prisma generate"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && npx prisma db seed && node server.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
timeout = 30
